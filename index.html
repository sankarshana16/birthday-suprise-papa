<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Birthday Challenge</title>
    <style>
        /* Dark Theme Styling */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background-color: #000000; 
            color: #ff3333; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container { 
            background: #111111; 
            padding: 40px; 
            border-radius: 20px; 
            border: 2px solid #ff0000; 
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.4); 
            max-width: 450px; 
            width: 90%; 
        }

        h1 { color: #ff0000; margin-bottom: 15px; text-transform: uppercase; }
        p { color: #ffffff; font-size: 1.1rem; margin-bottom: 25px; line-height: 1.5; }
        
        .progress { 
            font-size: 0.9rem; 
            color: #bb0000; 
            margin-bottom: 20px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        input { 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #ff0000; 
            background-color: #000; 
            color: #fff; 
            margin-bottom: 15px; 
            width: 85%; 
            outline: none; 
            font-size: 1rem;
            text-align: center;
        }

        button { 
            padding: 15px 30px; 
            background-color: #ff0000; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
            transition: 0.3s; 
            font-size: 1rem;
        }

        button:hover { background-color: #bb0000; transform: scale(1.05); }

        #message { margin-top: 15px; font-weight: bold; min-height: 24px; }

        /* Hiding the question area initially */
        #quiz-area { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <h1>Happy Birthday! 🎂</h1>
        <p>We have a special gift for you, but you have to prove you're worthy. Solve these 3 "Papa Jokes" to unlock your surprise!</p>
        <button onclick="startQuiz()">Start Challenge</button>
    </div>

    <div id="quiz-area">
        <div class="progress" id="stepIndicator">Question 1 of 3</div>
        <h1 id="questionTitle">Joke #1</h1>
        <p id="questionText">Computer ko thand lag jaye toh kya karta hai??</p>
        
        <input type="text" id="answerInput" placeholder="Enter answer..." autocomplete="off">
        <br>
        <button onclick="checkAnswer()" id="btnAction">Next →</button>
        <p id="message"></p>
    </div>
</div>

<script>
    let currentStep = 1;

    const challenge = [
        { 
            q: "Computer ko thand lag jaye toh kya karta hai??", 
            a: "windows band kar leta hai" 
        },
        { 
            q: "What can you only use when it breaks?", 
            a: "eggs" 
        },
        { 
            q: "What can you hold in your right hand, but not in your left hand?", 
            a: "your left hand" 
        }
    ];

    const pdfUrl = "papa_comic_merged_final.pdf"; 

    // Function to switch from Landing Page to Quiz
    function startQuiz() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
    }

    function checkAnswer() {
        const userInput = document.getElementById('answerInput').value.toLowerCase().trim();
        const msg = document.getElementById('message');
        const index = currentStep - 1;

        if (userInput === challenge[index].a) {
            if (currentStep < 3) {
                currentStep++;
                msg.style.color = "#00ff00"; 
                msg.innerHTML = "Correct! 🎂";
                
                setTimeout(() => {
                    document.getElementById('stepIndicator').innerHTML = `Question ${currentStep} of 3`;
                    document.getElementById('questionTitle').innerHTML = `Joke #${currentStep}`;
                    document.getElementById('questionText').innerHTML = challenge[currentStep-1].q;
                    document.getElementById('answerInput').value = "";
                    msg.innerHTML = "";
                    if(currentStep === 3) document.getElementById('btnAction').innerHTML = "Unlock Gift 🎁";
                }, 800);
            } else {
                msg.style.color = "#00ff00";
                msg.innerHTML = "Success! Opening your gift...";
                setTimeout(() => {
                    window.location.href = pdfUrl;
                }, 1000);
            }
        } else {
            msg.style.color = "#ff3333";
            msg.innerHTML = "Not quite! Try again. 🤔";
        }
    }

    // Allow "Enter" key to submit
    document.addEventListener("keyup", function(event) {
        if (event.key === "Enter") {
            // Check which section is visible to decide what Enter does
            if (document.getElementById('start-screen').style.display !== 'none') {
                startQuiz();
            } else {
                checkAnswer();
            }
        }
    });
</script>

</body>
</html>
