<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Birthday Challenge</title>
    <style>
        /* Modern CSS reset for layout */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            background-color: #000000; /* BLACK BACKGROUND */
            color: #ffcccc;           /* Light, muted red for secondary text */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container { 
            background: #111111; /* Slightly lighter black/dark grey for the card */
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.15); /* Soft RED shadow for depth */
            display: inline-block; 
            max-width: 400px; 
            width: 100%; 
            border: 1px solid #333; /* Subtle border to define the card */
        }

        /* BRIGHT RED for the main question title and step count */
        h1 { 
            color: #ff3333; /* Bright, vibrant red */
            margin-bottom: 10px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p#questionText {
            font-size: 1.2rem;
            margin-bottom: 25px;
            color: #ffcccc; /* Soft red for the actual question */
        }

        .progress { 
            font-size: 0.9rem; 
            color: #ff0000; /* Pure red for the step counter */
            margin-bottom: 20px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-weight: bold;
        }

        input { 
            padding: 12px 15px; 
            border-radius: 8px; 
            border: 2px solid #ff0000; /* RED BORDER for the input */
            margin-bottom: 15px; 
            width: 100%;
